<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benchmark Flooring LLC | Northeast Ohio's Standard for Flooring</title>
    <meta
      name="description"
      content="Expert flooring installation in Northeast Ohio. Carpet, tile, hardwood, LVP and laminate. Free in-home estimates serving Medina, Summit, Wayne and Stark counties." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#101b31" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <!-- Fonts are self-hosted and bundled by Vite from src/index.css; no external font CDN. -->
    <!--SEO_HEAD-->
  </head>
  <body>
    <!-- Hidden static form so Netlify detects it (and its fields) at build time.
         The live React quote form posts to this name. -->
    <form name="quote" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="address" />
      <input type="text" name="flooringType" />
      <input type="text" name="squareFootage" />
      <input type="text" name="referralSource" />
      <textarea name="details"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
